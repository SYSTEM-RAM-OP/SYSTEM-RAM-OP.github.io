name: 自动监听插件并生成 JSON

on:
  push:
    branches: [ main ] # 监听 main 分支的推送
    paths:
      - 'extensions/**' # 只要 extensions 文件夹里有变动
      - 'icons/**'      # 或者 icons 文件夹里有变动

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 执行生成 JSON 脚本
        run: node generate.js

      - name: 检查并提交生成的 JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add extensions-v0.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 自动更新 extensions-v0.json [actions skip]"
          git push
